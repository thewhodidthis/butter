<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Helps with pixel sorting">
    <title>butter.js</title>
    <link rel="icon" href="//example.thewhodidthis.com/favicon.ico">
    <link rel="preload" href="index.css" as="style">
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
  </head>
  <body>
    <!-- images from http://sipi.usc.edu/database/database.php -->
    <figure>
      <ul>
        <li>
          <img src="assets/5.3.01.jpg" height="180" width="180" alt="Man">
        </li>
        <li>
          <img src="assets/4.2.05.jpg" height="180" width="180" alt="Airplane F-16">
        </li>
        <li>
          <img src="assets/4.2.06.jpg" height="180" width="180" alt="Sailboat on lake">
        </li>
        <li>
          <canvas height="180" width="180">
            <img src="assets/5.3.01-after.png" height="180" width="180" alt="Screenshot: Man processed">
          </canvas>
        </li>
        <li>
          <canvas height="180" width="180">
            <img src="assets/4.2.05-after.png" height="180" width="180" alt="Screenshot: Airplane F-16 processed">
          </canvas>
        </li>
        <li>
          <canvas height="180" width="180">
            <img src="assets/4.2.06-after.png" height="180" width="180" alt="Screenshot: Sailboat on lake processed">
          </canvas>
        </li>
      </ul>
      <figcaption>
        <p><strong><a href="https://github.com/thewhodidthis/butter">butter.js</a></strong> Helps with pixel sorting</p>
      </figcaption>
    </figure>
  </body>
</html>
